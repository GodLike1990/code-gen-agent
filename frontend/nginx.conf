# =============================================================================
# frontend/nginx.conf
#
# Serves the Vite production build and reverse-proxies /agent/* to the
# backend service.  The backend service name "backend" is resolved via
# Docker Compose's internal DNS.
#
# SSE (Server-Sent Events) notes:
#   proxy_buffering off     — prevents nginx from buffering the response body,
#                             which would delay or completely block SSE frames
#   proxy_read_timeout 3600s — agent runs can take minutes; default 60s would
#                              kill long-running streams mid-execution
#   add_header X-Accel-Buffering no — tells any upstream proxy/CDN to also
#                              disable buffering for this response
# =============================================================================

server {
    listen 80;
    server_name _;

    # Static assets from Vite build
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback: any path that doesn't match a real file is served as
    # index.html so React Router can handle client-side navigation.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy all /agent/* requests to the FastAPI backend.
    # The trailing slash in proxy_pass is intentional: it strips the /agent
    # prefix before forwarding so the backend sees /agent/... as-is.
    location /agent/ {
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;

        # Forward real client information to backend logs
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # SSE: disable all buffering so events are delivered immediately
        proxy_buffering          off;
        proxy_cache              off;
        proxy_read_timeout       3600s;
        add_header               X-Accel-Buffering no;
    }

    # Health check — proxied directly so Docker / load-balancer probes work
    location = /health {
        proxy_pass http://backend:8000/health;
    }
}
